<section id="realmap" class="realmap" aria-label="Interactive map of the real route">
  <div class="wrap">
    <p class="label realmap-label reveal">The Actual Map</p>
    <h2 class="display realmap-title reveal" data-delay="1">Pin it. It&rsquo;s real.</h2>

    <div class="realmap-card reveal" data-delay="2">
      <div class="realmap-map" id="realmap-canvas" role="application"
           aria-label="Interactive map of the south coast route from Colombo airport to Hiriketiya">
        <p class="realmap-loading mono">Loading map</p>
        <p class="realmap-hint mono" aria-hidden="true">Click to zoom &middot; two fingers to move</p>
      </div>
      <img class="realmap-fallback" src="assets/img/route_map.svg" width="1180" height="430" hidden
           alt="Static map of Sri Lanka's south coast route from Colombo airport through Ahangama, Weligama and Mirissa to Hiriketiya">
    </div>

    <p class="mono realmap-caption">OpenStreetMap &middot; Route as driven &middot; 160km of coast</p>
  </div>
</section>
